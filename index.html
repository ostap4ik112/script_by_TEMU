<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL OVERRIDE</title>
    <style>
        body {
            background-color: black;
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            cursor: crosshair;
        }

        #console {
            width: 100%;
            height: 100%;
            overflow-y: hidden;
            word-wrap: break-word;
            font-size: 14px;
            text-shadow: 0 0 8px red;
            z-index: 1;
            line-height: 1.2;
        }

        .alert-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: red;
            color: white;
            padding: 30px;
            border: 4px solid white;
            font-weight: bold;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 50px red;
            font-size: 26px;
            text-transform: uppercase;
        }

        .flying-image {
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 2;
        }
        .flying-image.show { opacity: 1; }

        .glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(4px, 0); }
            50% { transform: translate(-4px, 0); }
            100% { transform: translate(0, 4px); }
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            pointer-events: none; display: none; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="console">
        [ для просмотра кішки нажмите любую клавишу ]<br>
        Ожидание...<br>
        НАЖМИТЕ ЛЮБУЮ КЛАВИШУ ИЛИ КЛИКНИТЕ ДЛЯ ПРОСМОТРА КІШКИ
    </div>
    
    <div id="alertBox" class="alert-box">СИСТЕМА УНИЧТОЖЕНА</div>
    <div id="redOverlay" class="overlay"></div>

    <script>
        const consoleDiv = document.getElementById('console');
        const alertBox = document.getElementById('alertBox');
        const body = document.body;
        const overlay = document.getElementById('redOverlay');
        
        let isRunning = false;

        const imageUrls = [
            "1_photo.png", "2_photo.png", "3_photo.png", "4_photo.png", "5_photo.png", "6_photo.png",
            "photo_babai.png", "photo_cookie.png", "photo_general.png", "photo_ger0.png"
        ];

        const phrases = [
            "CRITICAL_FAILURE", "ВНИМАНИЕ: ПРОЦЕССОР 1488°C", "DUMPING_MEMORY...", 
            "EXTRACTING_BANK_TOKENS...", "IP_FOUND: 184.22.109.11", "CAMERA_LINK_ESTABLISHED",
            "УДАЛЕНИЕ ВСЕХ ФАЙЛОВ...", "ОТПРАВКА СКРИНШОТОВ НА СЕРВЕР", "MALWARE_DEPLOYED",
            "БЛОКИРОВКА КЛАВИАТУРЫ...", "ФОРМАТИРОВАНИЕ ДИСКА C:/", "ВНИМАНИЕ: ВЫСЛАН НАРЯД ПОЛИЦИИ",
            "БРАУЗЕР: УСТАНОВЛЕН ТРОЯН... КУКИ ПЕРЕХВАЧЕНЫ", "ПОПЫТКА СБРОСА ПАРОЛЯ... ПОДТВЕРЖДЕНИЕ В ОТЧЕТЕ",
            "СКАЧИВАНИЕ ЛИЧНЫХ ДАННЫХ [45%]", "ПРОЦЕССОР: ПЕРЕГРЕВ! ПЕРЕГРЕВ!", "СИСТЕМНЫЙ СБОЙ, ДАННЫЕ УТЕРЯНЫ",
            "СКАЧИВАНИЕ ФОТОГАЛЕРЕИ...", "ВНИМАНИЕ: ВАШЕ МЕСТОПОЛОЖЕНИЕ РАСКРЫТО!"
        ];

        function playSound(ctx) {
            setInterval(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = Math.random() > 0.5 ? 'sawtooth' : 'square';
                osc.frequency.setValueAtTime(Math.random() * 2000 + 100, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
                osc.start(); osc.stop(ctx.currentTime + 0.08);
            }, 100);
        }

        function createImg() {
            if (imageUrls.length === 0) return;
            const img = document.createElement('img');
            img.src = imageUrls[Math.floor(Math.random() * imageUrls.length)];
            img.classList.add('flying-image');
            img.style.width = (Math.random() * 200 + 100) + "px"; 
            img.style.left = (Math.random() * 80 + 10) + "vw"; 
            img.style.top = (Math.random() * 80 + 10) + "vh"; 
            img.style.transform = `rotate(${Math.random() * 360}deg)`;
            body.appendChild(img);
            setTimeout(() => img.classList.add('show'), 10);
            setTimeout(() => { img.remove(); }, 2000);
        }

        function startChaos() {
            if (isRunning) return;
            isRunning = true;
            consoleDiv.innerHTML = "";

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playSound(audioCtx);

            setInterval(() => {
                const p = document.createElement('div');
                p.innerText = Math.random() > 0.4 ? phrases[Math.floor(Math.random() * phrases.length)] : "0x" + Math.random().toString(16).toUpperCase().substring(2, 10);
                consoleDiv.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                if (navigator.vibrate) navigator.vibrate(60);
                if(consoleDiv.childNodes.length > 100) consoleDiv.removeChild(consoleDiv.firstChild);
            }, 30);

            setInterval(() => {
                body.classList.toggle('glitch');
                overlay.style.display = (Math.random() > 0.7) ? 'block' : 'none';
                if (Math.random() > 0.92) {
                    alertBox.style.display = 'block';
                    alertBox.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                    setTimeout(() => alertBox.style.display = 'none', 500);
                }
            }, 120);

            setInterval(() => { if (Math.random() > 0.4) createImg(); }, 700);
        }

        window.addEventListener('click', startChaos);
        window.addEventListener('keydown', startChaos);

    </script>
</body>
</html>
